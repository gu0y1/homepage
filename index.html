<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chen Guoyi — Academic Homepage</title>
  <meta name="description" content="Academic homepage of Chen Guoyi, School of Computing, National University of Singapore.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
</head>
<body>

<header id="site-header"></header>

<main>

  <section id="about">
    <div class="about-row">
      <figure class="about-figure">
        <img class="about-photo" src="assets/guoyi.png" alt="Photo of Chen Guoyi">
        <figcaption>Guoyi is on the right.</figcaption>
      </figure>
      <div class="about-info">
        <p class="name">Chen Guoyi 陈国毅</p>
        <p class="affiliation">
          Research Assistant<br>
          School of Computing<br>
          National University of Singapore
        </p>
        <p class="more-link"><a href="about/">Read more about me →</a></p>

        <div class="profile-links" aria-label="Academic and professional profiles">
          <a
            href="https://scholar.google.com/citations?user=FMnS8mMAAAAJ"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Google Scholar"
          >
            <i class="fa-brands fa-google-scholar" aria-hidden="true"></i>
            <span>Google Scholar</span>
          </a>

          <a
            href="https://orcid.org/0009-0009-5776-5622"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="ORCID"
          >
            <i class="fa-brands fa-orcid" aria-hidden="true"></i>
            <span>ORCID</span>
          </a>

          <a
            href="https://github.com/gu0y1"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub"
          >
            <i class="fa-brands fa-github" aria-hidden="true"></i>
            <span>GitHub</span>
          </a>

          <a
            href="https://www.linkedin.com/in/chenguoyi/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="LinkedIn"
          >
            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
            <span>LinkedIn</span>
          </a>

          <a
            href="https://drive.google.com/file/d/1OEI-ij3U9DURymXr-Ms5DFBtbUxSEEqd/view?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="CV"
          >
            <i class="fa-solid fa-file-lines" aria-hidden="true"></i>
            <span>CV</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <section id="news">
    <h2>News</h2>
    <div id="news-list"></div>
    <p class="view-all"><a href="news/">View all news &rarr;</a></p>
  </section>

  <section id="selected-publications">
    <h2>Selected Publications</h2>
    <div id="pub-list"></div>
    <p class="view-all"><a href="publications/">View all publications &rarr;</a></p>
  </section>

  <section id="selected-projects">
    <h2>Selected Projects</h2>
    <div id="project-list"></div>
    <p class="view-all"><a href="projects/">View all projects →</a></p>
  </section>

</main>

<footer id="site-footer"></footer>

<script src="common.js"></script>
<script>
  initLayout();
  loadNews('news-list', {
    jsonPath: 'news/items.json',
    basePath: 'news/',
    linkBase: '',
    limit: 5,
    emptyMessage: 'News will be added here.'
  });
  loadItems('pub-list', 'publications', {
    jsonPath: 'publications/items.json',
    basePath: 'publications/',
    limit: 3,
    emptyMessage: 'Publications will be added here.'
  });
  loadItems('project-list', 'projects', {
    jsonPath: 'projects/items.json',
    basePath: 'projects/',
    limit: 3
  });
</script>
</body>
</html>
